{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/departments.css' %}">
  <title>Departments</title>
</head>

<body>
    
    <div class="d-flex">
    
        <div class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
            <h4 class="mb-4">HR System</h4>
            <ul class="nav flex-column">
                <li class="nav-item mb-2"><a href="{% url 'dashboard' %}" class="nav-link text-white">Dashboard</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-white">Reports</a></li>
                <li class="nav-item"><a href="{% url 'logout' %}" class="nav-link text-white fw-bold fs-5">Log out</a></li>
            </ul>
        </div>
     
        <div class="flex-grow-1 p-4 bg-light">
    
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-semibold">Departments Overview</h3>
                
            </div>
    
           <div class="row d-flex">
               {% for department in departments %}
                
                <div class="my-4 col-md-4">
                <div class="card border-0 shadow-sm p-3 d-flex flex-column align-items-center">
                    <h4 class="text-center mb-3">{{ department.name }}</h4>
                    <h5 class="text-muted mb-4">Total:{{ department.employee_set.count }}</h5>
                    <a href="{% url 'employee_by_department' dept_id=department.id %}" class="btn btn-success w-50">View Employees</a>
                </div>
                </div>

               {% endfor %}
           </div> 
    
        </div>
</body>
</html>
